apiVersion: v1
kind: ConfigMap
metadata:
  name: app1-deployment
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Hello Kubernetes!</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu:300">
        <style>
            body { font-family: 'Ubuntu', sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .main { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
            #message { font-size: 24px; color: #326ce5; margin-bottom: 20px; }
            table { width: 100%; border-top: 1px solid #eee; padding-top: 10px; }
            th { text-align: left; color: #666; }
        </style>
    </head>
    <body>
        <div class="main">
            <div id="message">Hello from App 1</div>
            <table>
                <tr><th>pod:</th><td>app1-pod-manual-id</td></tr>
                <tr><th>node:</th><td>K3s-Worker-Node</td></tr>
            </table>
        </div>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: nginx-container
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-storage
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-storage
        configMap:
          name: app1-deployment

---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
spec:
  selector:
    app: app1
  ports:
  - port: 80
    targetPort: 80